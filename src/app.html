<!doctype html>
<html lang="en" style="color-scheme:dark;background:#09090d;margin:0;padding:0;overflow:hidden">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="%sveltekit.assets%/grokden-icon-palette.js"></script>
    <script>
      try {
        const premiumKey = "Grokden.premiumGrokTheme.enabled";
        const settingsKey = "Grokden.settings";
        if (localStorage.getItem(premiumKey) === "1") {
          const parsed = JSON.parse(localStorage.getItem(settingsKey) || "{}");
          parsed.theme = "premium-grok";
          localStorage.setItem(settingsKey, JSON.stringify(parsed));
        }
        localStorage.removeItem(premiumKey);
      } catch (_) {}
    </script>
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-tokens.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-supergrok-welcome.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-ui.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-layout-controls.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-windowed-core.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-windowed-narrow.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-icon-palette.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-smooth-layout.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-vscode-editor.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-tab-panel-safe.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-ui-polish-hotfix.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-scrollbar-cleanup.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-pass3-polish.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-welcome.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-project-home.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/grokden-canvas.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grokden</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="background:#09090d;margin:0;padding:0;overflow:hidden">
    <div style="display: contents">%sveltekit.body%</div>
    <script defer src="%sveltekit.assets%/grokden-ui-hotfix.js"></script>
  </body>
</html>
